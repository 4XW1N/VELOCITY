<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SURF ENGINE: NEON</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; pointer-events: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="ui"><h1 id="speed">SPD: 0</h1><p>A/D: Strafe | SPACE: Jump</p></div>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const p = { x: 0, y: 5, z: 0, vx: 0, vy: 0, vz: 0 };
        const ramps = [];

        // --- SURF MAP DESIGN ---
        // Ramps are rotated meshes. You "surf" by moving into the slope.
        function addRamp(x,y,z, rot, color) {
            const geom = new THREE.BoxGeometry(40, 2, 60);
            const mat = new THREE.MeshPhongMaterial({color, wireframe: true});
            const mesh = new THREE.Mesh(geom, mat);
            mesh.position.set(x,y,z);
            mesh.rotation.z = rot;
            scene.add(mesh);
            ramps.push({mesh, rot});
        }

        addRamp(20, -5, -50, -0.8, 0x00ffff); // Right ramp
        addRamp(-20, -5, -120, 0.8, 0xff00ff); // Left ramp

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        let keys = {}, yaw = 0, pitch = 0;
        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;
        document.body.onclick = () => document.body.requestPointerLock();
        document.onmousemove = e => { if(document.pointerLockElement) { yaw -= e.movementX*0.002; pitch = Math.max(-1.5, Math.min(1.5, pitch - e.movementY*0.002)); } };

        function animate() {
            requestAnimationFrame(animate);

            // SURF PHYSICS: Strafe-based acceleration
            const right = new THREE.Vector3(1,0,0).applyEuler(new THREE.Euler(0, yaw, 0));
            if(keys['KeyA']) { p.vx -= right.x * 0.08; p.vz -= right.z * 0.08; }
            if(keys['KeyD']) { p.vx += right.x * 0.08; p.vz += right.z * 0.08; }
            
            // Gravity & Velocity
            p.vy -= 0.015;
            p.vx *= 0.99; p.vz *= 0.99;
            p.x += p.vx; p.y += p.vy; p.z += p.vz;

            // Simple Collision: If touching ramp, push up along normal
            ramps.forEach(r => {
                const dist = p.x - r.mesh.position.x;
                if(Math.abs(dist) < 20 && p.y < r.mesh.position.y + 5) {
                    p.vy += 0.03; // Ramp "lift"
                    p.y = r.mesh.position.y + 5;
                }
            });

            if(p.y < -100) { p.x=0; p.y=5; p.z=0; p.vx=0; p.vy=0; p.vz=0; }

            camera.position.set(p.x, p.y+1, p.z);
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            document.getElementById('speed').innerText = "SPD: " + Math.floor(Math.sqrt(p.vx**2 + p.vz**2)*100);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
