<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SURF & PARKOUR: VELOCITY</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; pointer-events: none; text-shadow: 0 0 5px #0ff; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="ui">
        <h1 id="speed">SPD: 0</h1>
        <p>A/D: Surf/Strafe | SPACE: Jump</p>
    </div>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Player Physics
        const p = { x: 0, y: 10, z: 0, vx: 0, vy: 0, vz: 0, isGrounded: false };
        const platforms = []; // For standard ground/parkour
        const ramps = [];     // For surf slopes

        // Setup Scene
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // Objects
        function addObj(x,y,z,w,h,d, rotZ, color, isRamp, isJumpPad) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshPhongMaterial({color, wireframe: isRamp}));
            mesh.position.set(x,y,z);
            mesh.rotation.z = rotZ;
            scene.add(mesh);
            if(isRamp) ramps.push({x,y,z,w,h,d,rotZ});
            else platforms.push({x,y,z,w,h,d,isJumpPad});
        }

        // Level Design
        addObj(0, -2, 0, 40, 2, 40, 0, 0xffffff, false, false); // Start
        addObj(20, -5, -60, 40, 2, 60, -0.7, 0x00ffff, true, false); // Surf Ramp
        addObj(-20, -10, -140, 40, 2, 60, 0.7, 0xff00ff, true, false); // Surf Ramp
        addObj(0, -5, -220, 20, 2, 20, 0, 0x00ff00, false, true); // Jump Pad

        let keys = {}, yaw = 0, pitch = 0;
        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;
        document.body.onclick = () => document.body.requestPointerLock();
        document.onmousemove = e => { if(document.pointerLockElement) { yaw -= e.movementX*0.002; pitch = Math.max(-1.5, Math.min(1.5, pitch - e.movementY*0.002)); } };

        function animate() {
            requestAnimationFrame(animate);

            // SURF/STRAFE PHYSICS
            const right = new THREE.Vector3(1,0,0).applyEuler(new THREE.Euler(0, yaw, 0));
            const wishDir = new THREE.Vector3(0,0,0);
            if(keys['KeyA']) wishDir.sub(right);
            if(keys['KeyD']) wishDir.add(right);
            
            // Air accel
            p.vx += wishDir.x * 0.05;
            p.vz += wishDir.z * 0.05;
            p.vx *= 0.98; p.vz *= 0.98;
            p.vy -= 0.015; // Gravity

            // Ramp Physics
            ramps.forEach(r => {
                const dx = p.x - r.x;
                if(Math.abs(dx) < r.w/2 && p.y < r.y + 5) {
                    p.vy = 0.1; // Surf slide
                    p.y = r.y + 2;
                }
            });

            // Collision & Jump Pads
            platforms.forEach(plat => {
                if(Math.abs(p.x - plat.x) < plat.w/2 && Math.abs(p.z - plat.z) < plat.d/2 && Math.abs(p.y - plat.y) < 2) {
                    p.y = plat.y + 2; p.vy = plat.isJumpPad ? 0.6 : 0; p.isGrounded = true;
                }
            });

            p.x += p.vx; p.y += p.vy; p.z += p.vz;
            if(p.y < -100) { p.x=0; p.y=10; p.z=0; p.vx=0; p.vy=0; p.vz=0; }

            camera.position.set(p.x, p.y+1, p.z);
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            document.getElementById('speed').innerText = "SPD: " + Math.floor(Math.sqrt(p.vx**2 + p.vz**2)*150);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
