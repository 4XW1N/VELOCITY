<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEON VELOCITY: LEVEL ARCHITECT</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #0ff; pointer-events: none; text-shadow: 0 0 10px #0ff; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="ui">
        <h1 id="speed">VELOCITY: 0</h1>
        <p>SPACE: Jump | SHIFT: Slide | WASD: Move</p>
    </div>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const p = { x: 0, y: 10, z: 0, vx: 0, vy: 0, vz: 0, isGrounded: false, isSliding: false };
        const platforms = [];

        // --- LEVEL DESIGN DATA ---
        // Format: {x, y, z, w, d, color, isBoost}
        const LEVEL_DESIGN = [
            {x:0, y:-2, z:0, w:40, d:40, c:0xff00ff, b:false}, // Start
            {x:0, y:-2, z:-60, w:20, d:20, c:0x00ffff, b:false}, // First Jump
            {x:40, y:-2, z:-100, w:20, d:20, c:0x00ff00, b:true}, // Boost Jump
            {x:40, y:-2, z:-160, w:10, d:40, c:0x00ffff, b:false}, // The Tight Corridor
            {x:0, y:-2, z:-220, w:20, d:20, c:0xff00ff, b:false}, // The Leap of Faith
            {x:-40, y:-2, z:-280, w:20, d:20, c:0x00ff00, b:true} // Final Pad
        ];

        LEVEL_DESIGN.forEach(data => {
            const mat = new THREE.MeshPhongMaterial({color: data.c, emissive: data.c, emissiveIntensity: 0.5});
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(data.w, 2, data.d), mat);
            mesh.position.set(data.x, data.y, data.z);
            scene.add(mesh);
            platforms.push(data);
        });

        scene.add(new THREE.AmbientLight(0xffffff, 0.3));
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 20, 10);
        scene.add(light);

        let keys = {}, yaw = 0, pitch = 0;
        window.onkeydown = e => keys[e.code] = true;
        window.onkeyup = e => keys[e.code] = false;
        document.body.onclick = () => document.body.requestPointerLock();
        document.onmousemove = e => { if(document.pointerLockElement) { yaw -= e.movementX*0.002; pitch = Math.max(-1, Math.min(1, pitch - e.movementY*0.002)); } };

        function animate() {
            requestAnimationFrame(animate);
            p.isSliding = keys['ShiftLeft'];
            const fwd = new THREE.Vector3(0,0,-1).applyEuler(new THREE.Euler(0, yaw, 0));
            const right = new THREE.Vector3(1,0,0).applyEuler(new THREE.Euler(0, yaw, 0));
            
            // Movement with air-strafing feel
            const accel = p.isGrounded ? (p.isSliding ? 0.08 : 0.05) : 0.02;
            if(keys['KeyW']) { p.vx += fwd.x*accel; p.vz += fwd.z*accel; }
            if(keys['KeyS']) { p.vx -= fwd.x*accel; p.vz -= fwd.z*accel; }
            if(keys['KeyA']) { p.vx -= right.x*accel; p.vz -= right.z*accel; }
            if(keys['KeyD']) { p.vx += right.x*accel; p.vz += right.z*accel; }
            
            if(keys['Space'] && p.isGrounded) { p.vy = 0.4; p.isGrounded = false; }

            p.vx *= 0.92; p.vz *= 0.92; p.vy -= 0.02;
            p.x += p.vx; p.y += p.vy; p.z += p.vz;

            p.isGrounded = false;
            platforms.forEach(plat => {
                if(Math.abs(p.x - plat.x) < plat.w/2 && Math.abs(p.z - plat.z) < plat.d/2 && Math.abs(p.y - plat.y) < 2) {
                    p.y = plat.y + 2; p.vy = 0; p.isGrounded = true;
                    if(plat.b) { p.vx *= 1.2; p.vz *= 1.2; }
                }
            });

            if(p.y < -50) { p.x=0; p.y=10; p.z=0; p.vx=0; p.vy=0; p.vz=0; }

            camera.position.set(p.x, p.y + (p.isSliding ? 0.2 : 1.2), p.z);
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            document.getElementById('speed').innerText = "VELOCITY: " + Math.floor(Math.sqrt(p.vx**2 + p.vz**2)*100);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
